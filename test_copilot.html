<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプルシューティング</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    color: white;
    font-family: Arial;
    text-align: center;
  }
  canvas {
    background: #111;
    display: block;
    margin: auto;
  }
  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
  }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let player = {
  x: 180,
  y: 550,
  width: 40,
  height: 20,
  speed: 5
};

let bullets = [];
let enemies = [];
let score = 0;
let keys = {};
let gameOver = false;

// キー入力
document.addEventListener("keydown", e => {
  keys[e.code] = true;

  if (e.code === "Space") {
    bullets.push({
      x: player.x + player.width / 2 - 2,
      y: player.y,
      width: 4,
      height: 10,
      speed: 7
    });
  }
});

document.addEventListener("keyup", e => {
  keys[e.code] = false;
});

// 敵生成
function spawnEnemy() {
  enemies.push({
    x: Math.random() * (canvas.width - 30),
    y: 0,
    width: 30,
    height: 30,
    speed: 2 + Math.random() * 2
  });
}

// 当たり判定
function isColliding(a, b) {
  return a.x < b.x + b.width &&
         a.x + a.width > b.x &&
         a.y < b.y + b.height &&
         a.y + a.height > b.y;
}

function update() {
  if (gameOver) return;

  // プレイヤー移動
  if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
  if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

  // 弾更新
  bullets.forEach((b, i) => {
    b.y -= b.speed;
    if (b.y < 0) bullets.splice(i, 1);
  });

  // 敵更新
  enemies.forEach((e, ei) => {
    e.y += e.speed;

    // プレイヤーに当たったらゲームオーバー
    if (isColliding(player, e)) {
      gameOver = true;
    }

    // 画面外
    if (e.y > canvas.height) enemies.splice(ei, 1);

    // 弾と衝突
    bullets.forEach((b, bi) => {
      if (isColliding(b, e)) {
        enemies.splice(ei, 1);
        bullets.splice(bi, 1);
        score += 10;
      }
    });
  });

  // 敵スポーン
  if (Math.random() < 0.03) spawnEnemy();

  document.getElementById("score").textContent = "Score: " + score;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // プレイヤー
  ctx.fillStyle = "lime";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // 弾
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.fillRect(b.x, b.y, b.width, b.height);
  });

  // 敵
  ctx.fillStyle = "red";
  enemies.forEach(e => {
    ctx.fillRect(e.x, e.y, e.width, e.height);
  });

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 110, 300);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
