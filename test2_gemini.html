<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMINI SPACE HORIZON - 超進化版シューティング</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #03030c;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        /* サイバー感のあるグリッド背景 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
            pointer-events: none;
        }
        
        h1 {
            margin-bottom: 12px;
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.6), 0 0 20px rgba(0, 255, 204, 0.3);
            font-weight: 800;
        }
        
        #gameWrapper {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2), 0 0 10px rgba(255, 0, 128, 0.2);
        }

        canvas {
            background: #020208;
            display: block;
            border: 2px solid #00ffcc;
            border-radius: 8px;
        }

        /* CRT走査線エフェクト */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: 10;
            pointer-events: none;
        }

        .ui-panel {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            width: 480px;
            padding: 0 10px;
            font-size: 13px;
            color: #888;
        }

        .ui-panel span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .highlight {
            color: #00ffcc;
            font-weight: bold;
        }
        
        .accent {
            color: #ff007f;
            font-weight: bold;
        }

        /* サウンドトグルボタン */
        #soundToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 20;
        }
        #soundToggle:hover {
            background: rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        
        /* モバイル用のタッチコントロール */
        .mobile-controls {
            display: none;
            width: 480px;
            margin-top: 15px;
            justify-content: space-between;
            user-select: none;
        }
        
        .btn-dir {
            width: 60px;
            height: 60px;
            background: rgba(0, 255, 204, 0.15);
            border: 2px solid #00ffcc;
            border-radius: 50%;
            color: #00ffcc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn-dir:active {
            background: rgba(0, 255, 204, 0.5);
        }
        
        .btn-shoot {
            width: 140px;
            height: 60px;
            background: rgba(255, 0, 127, 0.2);
            border: 2px solid #ff007f;
            border-radius: 30px;
            color: #ff007f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            touch-action: manipulation;
        }
        .btn-shoot:active {
            background: rgba(255, 0, 127, 0.6);
        }

        @media (max-width: 600px) {
            h1 { font-size: 20px; }
            #gameWrapper, .ui-panel, .mobile-controls {
                width: 95vw;
            }
            canvas {
                width: 100%;
                height: auto;
            }
            .mobile-controls {
                display: flex;
            }
            .ui-panel {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <button id="soundToggle">SOUND: ON</button>
    <h1>GEMINI HORIZON</h1>
    
    <div id="gameWrapper">
        <div class="scanlines"></div>
        <canvas id="gameCanvas" width="480" height="640"></canvas>
    </div>
    
    <div class="ui-panel">
        <div>移動: <span class="highlight">← / →</span> または <span class="highlight">A / D</span></div>
        <div>攻撃: <span class="highlight">スペースキー(長押し可)</span></div>
    </div>

    <div class="mobile-controls">
        <div id="btnLeft" class="btn-dir">◀</div>
        <div id="btnShoot" class="btn-shoot">FIRE</div>
        <div id="btnRight" class="btn-dir">▶</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- ゲームの状態 ---
let gameState = 'START'; // START, PLAYING, GAMEOVER
let score = 0;
let highScore = parseInt(localStorage.getItem('gemini_high_score') || '0');
let enemiesDefeated = 0;
let isNewHighScore = false;
let keys = {};

// --- モバイル操作用 ---
let mobileLeft = false;
let mobileRight = false;
let mobileShoot = false;

// --- プレイヤー (自機) ---
const player = {
    x: canvas.width / 2 - 20,
    y: canvas.height - 80,
    width: 40,
    height: 30,
    speed: 6.5,
    color: '#00ffcc',
    hp: 3,
    maxHp: 3,
    shield: 0,
    weapon: 'normal', // normal, double, triple
    weaponTimer: 0
};

// --- エンティティ配列 ---
let bullets = [];
let enemyBullets = [];
let enemies = [];
let items = [];
let particles = [];
let floatTexts = [];

// --- ジュース & カメラエフェクト ---
let screenShake = 0;
let flashScreen = false;
let flashTimer = 0;

// --- 武器設定 ---
const bulletSpeed = 9.5;
let lastShootTime = 0;
const shootCooldown = 140; // 自動連射の間隔 (ミリ秒)

// --- 敵の出現設定 ---
let spawnTimer = 0;
let spawnInterval = 55; // フレーム
let bossActive = false;
let boss = null;
let nextBossScore = 1500;

// --- 背景 (多層パララックススター) ---
let starLayers = [
    { stars: [], speed: 0.5, size: 1, color: '#2a2a40' },
    { stars: [], speed: 1.2, size: 1.5, color: '#5a5a80' },
    { stars: [], speed: 2.8, size: 2, color: '#00ffcc' }
];

// --- Web Audio 音源合成 ---
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playSound(type) {
    if (!soundEnabled) return;
    try {
        initAudio();
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        const now = audioCtx.currentTime;
        
        if (type === 'shoot') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(650, now);
            osc.frequency.exponentialRampToValueAtTime(80, now + 0.12);
            
            gain.gain.setValueAtTime(0.08, now);
            gain.gain.exponentialRampToValueAtTime(0.005, now + 0.12);
            
            osc.start(now);
            osc.stop(now + 0.12);
        } else if (type === 'enemyShoot') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.linearRampToValueAtTime(450, now + 0.1);
            
            gain.gain.setValueAtTime(0.06, now);
            gain.gain.exponentialRampToValueAtTime(0.005, now + 0.1);
            
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'hit') {
            // ノイズバッファを用いた爆発音
            const bufferSize = audioCtx.sampleRate * 0.15;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(600, now);
            filter.frequency.exponentialRampToValueAtTime(40, now + 0.15);
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.exponentialRampToValueAtTime(0.005, now + 0.15);
            
            noise.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            noise.start(now);
            noise.stop(now + 0.15);
        } else if (type === 'playerHit') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, now);
            osc.frequency.linearRampToValueAtTime(30, now + 0.25);
            
            gain.gain.setValueAtTime(0.18, now);
            gain.gain.exponentialRampToValueAtTime(0.005, now + 0.25);
            
            osc.start(now);
            osc.stop(now + 0.25);
        } else if (type === 'powerup') {
            // アルペジオ
            const notes = [261.63, 329.63, 392.00, 523.25]; // C E G C
            notes.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                
                const noteTime = now + idx * 0.07;
                gain.gain.setValueAtTime(0, now);
                gain.gain.setValueAtTime(0.07, noteTime);
                gain.gain.exponentialRampToValueAtTime(0.005, noteTime + 0.12);
                
                osc.start(noteTime);
                osc.stop(noteTime + 0.12);
            });
        } else if (type === 'bossSpawn') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(70, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.8);
            
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0.005, now + 0.8);
            
            osc.start(now);
            osc.stop(now + 0.8);
        } else if (type === 'gameover') {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.exponentialRampToValueAtTime(25, now + 0.7);
            
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.005, now + 0.7);
            
            osc.start(now);
            osc.stop(now + 0.7);
        }
    } catch (e) {
        console.warn("Audio Context is blocked or not supported:", e);
    }
}

// --- 背景星の初期化 ---
function initStars() {
    starLayers.forEach(layer => {
        layer.stars = [];
        for (let i = 0; i < 20; i++) {
            layer.stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height
            });
        }
    });
}

function updateStars() {
    starLayers.forEach(layer => {
        layer.stars.forEach(star => {
            star.y += layer.speed;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        });
    });
}

function drawStars() {
    starLayers.forEach(layer => {
        ctx.fillStyle = layer.color;
        layer.stars.forEach(star => {
            ctx.fillRect(star.x, star.y, layer.size, layer.size);
        });
    });
}

// --- パーティクルシステム ---
function createExplosion(x, y, color, count = 12) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3.5 + 1;
        particles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: Math.random() * 2.5 + 1,
            color: color || '#fff',
            alpha: 1,
            decay: Math.random() * 0.025 + 0.015
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= p.decay;
        if (p.alpha <= 0) {
            particles.splice(i, 1);
        }
    }
}

function drawParticles() {
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });
}

// --- フローティングテキストシステム ---
function addFloatText(x, y, text, color) {
    floatTexts.push({
        x: x,
        y: y,
        text: text,
        color: color || '#fff',
        vy: -1.0,
        alpha: 1.0,
        life: 50
    });
}

function updateFloatTexts() {
    for (let i = floatTexts.length - 1; i >= 0; i--) {
        const ft = floatTexts[i];
        ft.y += ft.vy;
        ft.alpha -= 1 / ft.life;
        if (ft.alpha <= 0) {
            floatTexts.splice(i, 1);
        }
    }
}

function drawFloatTexts() {
    floatTexts.forEach(ft => {
        ctx.save();
        ctx.globalAlpha = ft.alpha;
        ctx.fillStyle = ft.color;
        ctx.font = 'bold 13px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.restore();
    });
}

// --- ゲームの初期化/リセット ---
function resetGame() {
    score = 0;
    enemiesDefeated = 0;
    isNewHighScore = false;
    bullets = [];
    enemyBullets = [];
    enemies = [];
    items = [];
    particles = [];
    floatTexts = [];
    screenShake = 0;
    flashScreen = false;
    
    player.x = canvas.width / 2 - player.width / 2;
    player.y = canvas.height - 80;
    player.hp = player.maxHp;
    player.shield = 0;
    player.weapon = 'normal';
    player.weaponTimer = 0;
    
    spawnTimer = 0;
    spawnInterval = 55;
    bossActive = false;
    boss = null;
    nextBossScore = 1500;
    
    initStars();
}

// --- 衝突判定ヘルパー ---
function isColliding(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// --- 自機のショット発射 ---
function shoot() {
    const now = Date.now();
    if (now - lastShootTime < shootCooldown) return;
    lastShootTime = now;
    
    playSound('shoot');
    
    if (player.weapon === 'triple') {
        // 3方向
        bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, vx: 0, vy: -bulletSpeed, width: 6, height: 16, color: '#fffb00' });
        bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, vx: -2, vy: -bulletSpeed * 0.9, width: 6, height: 16, color: '#fffb00' });
        bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, vx: 2, vy: -bulletSpeed * 0.9, width: 6, height: 16, color: '#fffb00' });
    } else if (player.weapon === 'double') {
        // 2連装平行レーザー
        bullets.push({ x: player.x + 4, y: player.y, vx: 0, vy: -bulletSpeed, width: 6, height: 16, color: '#ff007f' });
        bullets.push({ x: player.x + player.width - 10, y: player.y, vx: 0, vy: -bulletSpeed, width: 6, height: 16, color: '#ff007f' });
    } else {
        // 通常
        bullets.push({ x: player.x + player.width / 2 - 3, y: player.y, vx: 0, vy: -bulletSpeed, width: 6, height: 16, color: '#00ffcc' });
    }
}

// --- アイテムの出現 ---
function spawnItem(x, y) {
    if (Math.random() > 0.28) return; // 28%の確率でアイテムドロップ
    
    const types = ['heal', 'double', 'triple', 'shield', 'bomb'];
    const weights = [0.25, 0.22, 0.15, 0.25, 0.13];
    
    let r = Math.random();
    let type = 'heal';
    let sum = 0;
    
    for (let i = 0; i < types.length; i++) {
        sum += weights[i];
        if (r <= sum) {
            type = types[i];
            break;
        }
    }
    
    let color = '#fff';
    let label = '';
    
    if (type === 'heal') { color = '#00ff66'; label = '❤️'; }
    else if (type === 'double') { color = '#ff007f'; label = '⚡'; }
    else if (type === 'triple') { color = '#fffb00'; label = '🔱'; }
    else if (type === 'shield') { color = '#00ffff'; label = '🛡️'; }
    else if (type === 'bomb') { color = '#ff6600'; label = '💥'; }
    
    items.push({
        x: x - 12,
        y: y,
        width: 24,
        height: 24,
        type: type,
        color: color,
        label: label,
        speed: 1.6
    });
}

// --- ボスの出現 ---
function spawnBoss() {
    bossActive = true;
    screenShake = 25;
    playSound('bossSpawn');
    
    boss = {
        x: canvas.width / 2 - 50,
        y: -100,
        targetY: 80,
        width: 100,
        height: 60,
        hp: 16 + Math.floor(score / 500),
        maxHp: 16 + Math.floor(score / 500),
        speed: 2.0,
        direction: 1,
        shootTimer: 0,
        color: '#ff007f'
    };
    
    addFloatText(canvas.width / 2, 180, '⚠️ BOSS INBOUND ⚠️', '#ff0055');
}

// --- 爆弾 (ボム) の発動 ---
function triggerBomb() {
    playSound('hit');
    playSound('playerHit');
    screenShake = 30;
    flashScreen = true;
    flashTimer = 12;
    
    addFloatText(canvas.width / 2, canvas.height / 2 - 50, '💣 MEGA BOMB! 💣', '#ff6600');
    
    // 全通常敵を破壊
    enemies.forEach(enemy => {
        createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, 12);
        score += enemy.points;
        enemiesDefeated++;
    });
    enemies = [];
    
    // 敵弾をすべて消去
    enemyBullets = [];
    
    // ボスへの大ダメージ
    if (bossActive && boss) {
        boss.hp -= 8;
        addFloatText(boss.x + boss.width / 2, boss.y + boss.height / 2, '-8 HP', '#ff0055');
        if (boss.hp <= 0) {
            defeatBoss();
        }
    }
}

// --- ボスの撃破 ---
function defeatBoss() {
    bossActive = false;
    screenShake = 40;
    playSound('playerHit');
    
    // 盛大なエフェクト
    createExplosion(boss.x + boss.width / 2, boss.y + boss.height / 2, '#ff0055', 40);
    
    // アイテムを複数ドロップ
    spawnItem(boss.x + boss.width / 3, boss.y + boss.height / 2);
    spawnItem(boss.x + 2 * boss.width / 3, boss.y + boss.height / 2);
    
    score += 1000;
    enemiesDefeated += 5;
    addFloatText(boss.x + boss.width / 2, boss.y + boss.height / 2, 'BOSS SLAYED! +1000', '#00ffcc');
    
    boss = null;
}

// --- 敵の個別出現 ---
function spawnEnemy() {
    const enemyTypes = [
        { type: 'fighter', hp: 1, speed: 2.2, color: '#ff2d55', size: 26, points: 100 },
        { type: 'wobbler', hp: 1, speed: 2.5, color: '#00e5ff', size: 22, points: 150 },
        { type: 'heavy', hp: 3, speed: 1.2, color: '#39ff14', size: 38, points: 200 },
        { type: 'shooter', hp: 2, speed: 1.6, color: '#ff9f0a', size: 30, points: 250 }
    ];
    
    let availableTypes = [enemyTypes[0]];
    if (score >= 300) availableTypes.push(enemyTypes[1]);
    if (score >= 600) availableTypes.push(enemyTypes[2]);
    if (score >= 1000) availableTypes.push(enemyTypes[3]);
    
    const baseType = availableTypes[Math.floor(Math.random() * availableTypes.length)];
    const size = baseType.size;
    
    enemies.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        width: size,
        height: size,
        hp: baseType.hp,
        maxHp: baseType.hp,
        speed: baseType.speed + (score / 4500), // スコアに比例して少しだけ速度アップ
        color: baseType.color,
        type: baseType.type,
        points: baseType.points,
        shootTimer: Math.random() * 50,
        wobbleOffset: Math.random() * Math.PI * 2
    });
}

// --- キーボードイベント ---
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    
    // 開始 & リスタート処理
    if (e.code === 'Space') {
        if (gameState === 'START') {
            resetGame();
            gameState = 'PLAYING';
            playSound('powerup');
        } else if (gameState === 'GAMEOVER') {
            resetGame();
            gameState = 'PLAYING';
            playSound('powerup');
        }
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// --- タッチイベント設定 (モバイル用) ---
const setupMobileControls = () => {
    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');
    const btnShoot = document.getElementById('btnShoot');
    
    const handleStart = (type) => {
        initAudio();
        if (gameState === 'START' || gameState === 'GAMEOVER') {
            resetGame();
            gameState = 'PLAYING';
            playSound('powerup');
            return;
        }
        if (type === 'left') mobileLeft = true;
        if (type === 'right') mobileRight = true;
        if (type === 'shoot') mobileShoot = true;
    };
    
    const handleEnd = (type) => {
        if (type === 'left') mobileLeft = false;
        if (type === 'right') mobileRight = false;
        if (type === 'shoot') mobileShoot = false;
    };
    
    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart('left'); });
    btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd('left'); });
    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart('right'); });
    btnRight.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd('right'); });
    btnShoot.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart('shoot'); });
    btnShoot.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd('shoot'); });
    
    // PCでのマウスクリック対応 (テスト用)
    btnLeft.addEventListener('mousedown', () => handleStart('left'));
    btnLeft.addEventListener('mouseup', () => handleEnd('left'));
    btnRight.addEventListener('mousedown', () => handleStart('right'));
    btnRight.addEventListener('mouseup', () => handleEnd('right'));
    btnShoot.addEventListener('mousedown', () => handleStart('shoot'));
    btnShoot.addEventListener('mouseup', () => handleEnd('shoot'));
};

document.getElementById('soundToggle').addEventListener('click', (e) => {
    soundEnabled = !soundEnabled;
    e.target.textContent = `SOUND: ${soundEnabled ? 'ON' : 'OFF'}`;
    initAudio();
    e.target.blur();
});

// --- アップデート処理 ---
function update() {
    if (gameState !== 'PLAYING') return;

    // カメラエフェクト
    if (screenShake > 0) screenShake -= 0.8;
    if (flashScreen) {
        flashTimer--;
        if (flashTimer <= 0) flashScreen = false;
    }

    // パララックス背景アップデート
    updateStars();

    // 自機の移動
    if (keys['ArrowLeft'] || keys['KeyA'] || mobileLeft) {
        player.x -= player.speed;
    }
    if (keys['ArrowRight'] || keys['KeyD'] || mobileRight) {
        player.x += player.speed;
    }
    
    // 画面端の制限
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    // 自機の連射/自動ショット
    if (keys['Space'] || mobileShoot) {
        shoot();
    }

    // パワーアップ制限時間の更新
    if (player.weapon !== 'normal') {
        player.weaponTimer--;
        if (player.weaponTimer <= 0) {
            player.weapon = 'normal';
            addFloatText(player.x + player.width / 2, player.y - 15, 'WEAPON EXPIRED', '#aaaaaa');
        }
    }

    // プレイヤーショットの移動
    bullets.forEach((bullet, index) => {
        bullet.y += bullet.vy;
        bullet.x += bullet.vx || 0;
        
        // 画面外で消去
        if (bullet.y + bullet.height < 0 || bullet.x < -10 || bullet.x > canvas.width + 10) {
            bullets.splice(index, 1);
        }
    });

    // 敵弾の移動とプレイヤー衝突判定
    enemyBullets.forEach((eb, index) => {
        eb.y += eb.vy;
        eb.x += eb.vx || 0;
        
        // 画面外消去
        if (eb.y > canvas.height) {
            enemyBullets.splice(index, 1);
            return;
        }
        
        // プレイヤーへの衝突判定
        if (isColliding(eb, player)) {
            enemyBullets.splice(index, 1);
            
            if (player.shield > 0) {
                player.shield = 0;
                screenShake = 8;
                playSound('powerup');
                addFloatText(player.x + player.width / 2, player.y - 15, '🛡️ SHIELD BROKEN', '#00ffff');
            } else {
                player.hp--;
                screenShake = 16;
                playSound('playerHit');
                createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#ff3b30', 15);
                addFloatText(player.x + player.width / 2, player.y - 15, '-1 LIFE', '#ff3b30');
                
                if (player.hp <= 0) {
                    triggerGameOver();
                }
            }
        }
    });

    // 敵の出現管理 (ボスが非アクティブな場合のみ)
    if (!bossActive) {
        spawnTimer++;
        const currentInterval = Math.max(16, spawnInterval - Math.floor(score / 350));
        if (spawnTimer >= currentInterval) {
            spawnEnemy();
            spawnTimer = 0;
        }
        
        // ボス出現トリガー
        if (score >= nextBossScore) {
            spawnBoss();
            nextBossScore += 1800;
        }
    }

    // ボスの更新
    if (bossActive && boss) {
        if (boss.y < boss.targetY) {
            boss.y += 1.5;
        } else {
            boss.x += boss.speed * boss.direction;
            if (boss.x < 15 || boss.x > canvas.width - boss.width - 15) {
                boss.direction *= -1;
            }
            
            // ボス攻撃パターン
            boss.shootTimer++;
            if (boss.shootTimer >= 85) {
                boss.shootTimer = 0;
                playSound('enemyShoot');
                
                // 5方向扇形ショット
                for (let i = -2; i <= 2; i++) {
                    enemyBullets.push({
                        x: boss.x + boss.width / 2,
                        y: boss.y + boss.height,
                        vx: i * 1.5,
                        vy: 4.5,
                        width: 8,
                        height: 8,
                        color: '#ff007f'
                    });
                }
            }
        }
        
        // プレイヤー弾とボスとの当たり判定
        bullets.forEach((bullet, bIndex) => {
            if (isColliding(bullet, boss) && boss.y > 0) {
                bullets.splice(bIndex, 1);
                boss.hp--;
                screenShake = 3;
                createExplosion(bullet.x, bullet.y, '#ff007f', 4);
                
                if (boss.hp <= 0) {
                    defeatBoss();
                }
            }
        });
        
        // ボスとプレイヤー本体の衝突
        if (isColliding(player, boss)) {
            triggerGameOver();
        }
    }

    // 通常敵の更新
    enemies.forEach((enemy, eIndex) => {
        enemy.y += enemy.speed;

        // 特殊移動 (Wobbler)
        if (enemy.type === 'wobbler') {
            enemy.wobbleOffset += 0.05;
            enemy.x += Math.sin(enemy.wobbleOffset) * 2.2;
            if (enemy.x < 0) enemy.x = 0;
            if (enemy.x > canvas.width - enemy.width) enemy.x = canvas.width - enemy.width;
        }
        
        // 特殊射撃 (Shooter)
        if (enemy.type === 'shooter') {
            enemy.shootTimer++;
            if (enemy.shootTimer >= 90) {
                enemy.shootTimer = 0;
                playSound('enemyShoot');
                enemyBullets.push({
                    x: enemy.x + enemy.width / 2,
                    y: enemy.y + enemy.height,
                    vx: 0,
                    vy: 5.0,
                    width: 6,
                    height: 14,
                    color: '#ff9f0a'
                });
            }
        }

        // 画面外到達でペナルティなく消去
        if (enemy.y > canvas.height) {
            enemies.splice(eIndex, 1);
            return;
        }

        // 自機との衝突
        if (isColliding(player, enemy)) {
            enemies.splice(eIndex, 1);
            createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, 15);
            
            if (player.shield > 0) {
                player.shield = 0;
                screenShake = 12;
                playSound('powerup');
                addFloatText(player.x + player.width / 2, player.y - 15, '🛡️ SHIELD BROKEN', '#00ffff');
            } else {
                player.hp--;
                screenShake = 20;
                playSound('playerHit');
                addFloatText(player.x + player.width / 2, player.y - 15, '-1 LIFE', '#ff3b30');
                
                if (player.hp <= 0) {
                    triggerGameOver();
                }
            }
            return;
        }

        // プレイヤーの弾との衝突判定
        bullets.forEach((bullet, bIndex) => {
            if (isColliding(bullet, enemy)) {
                bullets.splice(bIndex, 1);
                enemy.hp--;
                
                // 被弾エフェクト
                createExplosion(bullet.x, bullet.y, enemy.color, 3);
                screenShake = 1.5;

                if (enemy.hp <= 0) {
                    enemies.splice(eIndex, 1);
                    playSound('hit');
                    createExplosion(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, enemy.color, 12);
                    
                    score += enemy.points;
                    enemiesDefeated++;
                    
                    // アイテム出現抽選
                    spawnItem(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2);
                }
            }
        });
    });

    // パワーアップアイテムの更新
    items.forEach((item, index) => {
        item.y += item.speed;
        
        // 画面外で消去
        if (item.y > canvas.height) {
            items.splice(index, 1);
            return;
        }
        
        // プレイヤーと衝突判定 (取得)
        if (isColliding(item, player)) {
            items.splice(index, 1);
            playSound('powerup');
            
            if (item.type === 'heal') {
                player.hp = Math.min(player.maxHp, player.hp + 1);
                addFloatText(player.x + player.width / 2, player.y - 20, '❤️ LIFE RECOVERED', '#00ff66');
            } else if (item.type === 'double') {
                player.weapon = 'double';
                player.weaponTimer = 480; // 8秒 (60fps * 8)
                addFloatText(player.x + player.width / 2, player.y - 20, '⚡ TWIN LASER!', '#ff007f');
            } else if (item.type === 'triple') {
                player.weapon = 'triple';
                player.weaponTimer = 360; // 6秒 (60fps * 6)
                addFloatText(player.x + player.width / 2, player.y - 20, '🔱 TRIPLE LASER!', '#fffb00');
            } else if (item.type === 'shield') {
                player.shield = 1;
                addFloatText(player.x + player.width / 2, player.y - 20, '🛡️ SHIELD EQUIPPED', '#00ffff');
            } else if (item.type === 'bomb') {
                triggerBomb();
            }
        }
    });

    // エフェクト配列の更新
    updateParticles();
    updateFloatTexts();
}

// --- ゲームオーバー処理 ---
function triggerGameOver() {
    gameState = 'GAMEOVER';
    playSound('gameover');
    createExplosion(player.x + player.width / 2, player.y + player.height / 2, '#00ffcc', 25);
    
    // ハイスコア保存
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('gemini_high_score', highScore);
        isNewHighScore = true;
    }
}

// --- 描画処理 ---
function draw() {
    // 画面クリア
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // スクリーンフラッシュ
    if (flashScreen) {
        ctx.fillStyle = `rgba(255, 255, 255, ${flashTimer / 12})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // カメラ振れの適用
    ctx.save();
    if (screenShake > 0) {
        const dx = (Math.random() - 0.5) * screenShake * 1.5;
        const dy = (Math.random() - 0.5) * screenShake * 1.5;
        ctx.translate(dx, dy);
    }

    // 背景星の描画
    drawStars();

    if (gameState === 'START') {
        // スタート画面
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00ffcc';
        
        ctx.fillStyle = '#00ffcc';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GEMINI HORIZON', canvas.width / 2, canvas.height / 2 - 80);
        
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff007f';
        ctx.fillStyle = '#ff007f';
        ctx.font = 'bold 16px monospace';
        ctx.fillText('⚡ ULTRA VIBE EDITION ⚡', canvas.width / 2, canvas.height / 2 - 40);
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        // 点滅エフェクト
        if (Math.floor(Date.now() / 500) % 2 === 0) {
            ctx.fillText('PRESS SPACE TO START', canvas.width / 2, canvas.height / 2 + 50);
        }
        
        // 操作説明
        ctx.fillStyle = '#888';
        ctx.font = '13px sans-serif';
        ctx.fillText('← / → / A / D : 移動', canvas.width / 2, canvas.height / 2 + 120);
        ctx.fillText('Space : ショット長押し', canvas.width / 2, canvas.height / 2 + 145);
        ctx.fillText('緑: 回復 | 赤: 2連 | 黄: 3方向 | 青: シールド | 橙: 爆弾', canvas.width / 2, canvas.height / 2 + 180);
        
        ctx.restore();
        return;
    }

    if (gameState === 'GAMEOVER') {
        // ゲームオーバー画面
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff3b30';
        ctx.fillStyle = '#ff3b30';
        ctx.font = 'bold 42px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 100);
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#aaa';
        ctx.font = '16px sans-serif';
        ctx.fillText(`SCORE: ${score}`, canvas.width / 2, canvas.height / 2 - 35);
        ctx.fillText(`ENEMIES VAPORIZED: ${enemiesDefeated}`, canvas.width / 2, canvas.height / 2 - 10);
        
        if (isNewHighScore) {
            ctx.fillStyle = '#fffb00';
            ctx.font = 'bold 18px sans-serif';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#fffb00';
            // レインボーのような点滅
            if (Math.floor(Date.now() / 200) % 2 === 0) {
                ctx.fillText('⭐ NEW HIGH RECORD! ⭐', canvas.width / 2, canvas.height / 2 + 30);
            }
            ctx.shadowBlur = 0;
        } else {
            ctx.fillStyle = '#888';
            ctx.font = '15px sans-serif';
            ctx.fillText(`HIGH SCORE: ${highScore}`, canvas.width / 2, canvas.height / 2 + 30);
        }
        
        ctx.fillStyle = '#fff';
        ctx.font = '16px sans-serif';
        if (Math.floor(Date.now() / 500) % 2 === 0) {
            ctx.fillText('PRESS SPACE TO RESTART', canvas.width / 2, canvas.height / 2 + 110);
        }
        
        ctx.restore();
        return;
    }

    // --- プレイ中の各描画 ---

    // 1. パワーアップアイテム描画
    items.forEach(item => {
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = item.color;
        ctx.fillStyle = item.color;
        ctx.beginPath();
        ctx.arc(item.x + item.width / 2, item.y + item.height / 2, item.width / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(item.x + item.width / 2, item.y + item.height / 2, item.width / 2 + 3, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(item.label, item.x + item.width / 2, item.y + item.height / 2);
        ctx.restore();
    });

    // 2. 自機の描画
    ctx.save();
    
    // バーニアの炎
    ctx.fillStyle = Math.random() > 0.5 ? '#ff3b30' : '#ff9f0a';
    ctx.beginPath();
    ctx.moveTo(player.x + player.width / 2, player.y + player.height);
    ctx.lineTo(player.x + player.width / 2 - 5, player.y + player.height + 8 + Math.random() * 6);
    ctx.lineTo(player.x + player.width / 2 + 5, player.y + player.height + 8 + Math.random() * 6);
    ctx.closePath();
    ctx.fill();
    
    // メイン機体
    ctx.fillStyle = player.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = player.color;
    ctx.beginPath();
    ctx.moveTo(player.x + player.width / 2, player.y); // ノーズ
    ctx.lineTo(player.x, player.y + player.height - 4); // 左翼端
    ctx.lineTo(player.x + 8, player.y + player.height - 9); // インナースリット
    ctx.lineTo(player.x + player.width - 8, player.y + player.height - 9);
    ctx.lineTo(player.x + player.width, player.y + player.height - 4); // 右翼端
    ctx.closePath();
    ctx.fill();
    
    // コックピット
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(player.x + player.width / 2, player.y + 6);
    ctx.lineTo(player.x + player.width / 2 - 3, player.y + 14);
    ctx.lineTo(player.x + player.width / 2 + 3, player.y + 14);
    ctx.closePath();
    ctx.fill();

    // シールドエフェクト
    if (player.shield > 0) {
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 15;
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(player.x + player.width / 2, player.y + player.height / 2, player.width * 0.75, 0, Math.PI * 2);
        ctx.stroke();
    }
    ctx.restore();

    // 3. 自機ショットの描画
    bullets.forEach(bullet => {
        ctx.save();
        ctx.fillStyle = bullet.color;
        ctx.shadowBlur = 12;
        ctx.shadowColor = bullet.color;
        ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        ctx.restore();
    });

    // 4. 敵弾の描画
    enemyBullets.forEach(eb => {
        ctx.save();
        ctx.fillStyle = eb.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = eb.color;
        ctx.beginPath();
        if (eb.width === eb.height) {
            ctx.arc(eb.x, eb.y, eb.width / 2, 0, Math.PI * 2);
            ctx.fill();
        } else {
            ctx.fillRect(eb.x, eb.y, eb.width, eb.height);
        }
        ctx.restore();
    });

    // 5. 敵キャラクターの描画
    enemies.forEach(enemy => {
        ctx.save();
        ctx.fillStyle = enemy.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = enemy.color;
        
        ctx.beginPath();
        if (enemy.type === 'fighter') {
            // シャープな三角形状
            ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
            ctx.lineTo(enemy.x, enemy.y);
            ctx.lineTo(enemy.x + enemy.width / 2, enemy.y + 4);
            ctx.lineTo(enemy.x + enemy.width, enemy.y);
        } else if (enemy.type === 'wobbler') {
            // ダイヤ形状
            ctx.moveTo(enemy.x + enemy.width / 2, enemy.y);
            ctx.lineTo(enemy.x, enemy.y + enemy.height / 2);
            ctx.lineTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
            ctx.lineTo(enemy.x + enemy.width, enemy.y + enemy.height / 2);
        } else if (enemy.type === 'heavy') {
            // 六角形状
            ctx.moveTo(enemy.x + enemy.width / 4, enemy.y);
            ctx.lineTo(enemy.x, enemy.y + enemy.height / 2);
            ctx.lineTo(enemy.x + enemy.width / 4, enemy.y + enemy.height);
            ctx.lineTo(enemy.x + 3 * enemy.width / 4, enemy.y + enemy.height);
            ctx.lineTo(enemy.x + enemy.width, enemy.y + enemy.height / 2);
            ctx.lineTo(enemy.x + 3 * enemy.width / 4, enemy.y);
        } else if (enemy.type === 'shooter') {
            // キャノン突出形状
            ctx.moveTo(enemy.x + enemy.width / 2, enemy.y + enemy.height);
            ctx.lineTo(enemy.x + enemy.width / 4, enemy.y + 3 * enemy.height / 4);
            ctx.lineTo(enemy.x, enemy.y);
            ctx.lineTo(enemy.x + enemy.width, enemy.y);
            ctx.lineTo(enemy.x + 3 * enemy.width / 4, enemy.y + 3 * enemy.height / 4);
        }
        ctx.closePath();
        ctx.fill();
        
        // ヘヴィタイプはライフインジケータを背負う
        if (enemy.type === 'heavy' && enemy.hp < enemy.maxHp) {
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.fillRect(enemy.x, enemy.y - 8, enemy.width, 3);
            ctx.fillStyle = '#39ff14';
            ctx.fillRect(enemy.x, enemy.y - 8, enemy.width * (enemy.hp / enemy.maxHp), 3);
        }
        ctx.restore();
    });

    // 6. ボスの描画
    if (bossActive && boss) {
        ctx.save();
        ctx.fillStyle = boss.color;
        ctx.shadowBlur = 18;
        ctx.shadowColor = boss.color;
        
        ctx.beginPath();
        ctx.moveTo(boss.x + boss.width / 2, boss.y + boss.height); // ノーズ
        ctx.lineTo(boss.x + boss.width / 5, boss.y + 4 * boss.height / 5);
        ctx.lineTo(boss.x, boss.y + boss.height / 3);
        ctx.lineTo(boss.x + boss.width / 6, boss.y);
        ctx.lineTo(boss.x + 5 * boss.width / 6, boss.y);
        ctx.lineTo(boss.x + boss.width, boss.y + boss.height / 3);
        ctx.lineTo(boss.x + 4 * boss.width / 5, boss.y + 4 * boss.height / 5);
        ctx.closePath();
        ctx.fill();
        
        // 発光機関部
        ctx.fillStyle = '#00ffff';
        ctx.shadowColor = '#00ffff';
        ctx.fillRect(boss.x + boss.width / 4 - 5, boss.y - 4, 10, 4);
        ctx.fillRect(boss.x + 3 * boss.width / 4 - 5, boss.y - 4, 10, 4);
        ctx.restore();
        
        // ボスHPバー (画面トップに描画)
        ctx.fillStyle = 'rgba(255, 0, 127, 0.15)';
        ctx.fillRect(20, 75, canvas.width - 40, 10);
        ctx.strokeStyle = '#ff007f';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(20, 75, canvas.width - 40, 10);
        ctx.fillStyle = '#ff007f';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ff007f';
        ctx.fillRect(20, 75, (canvas.width - 40) * (boss.hp / boss.maxHp), 10);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`BOSS APEX: ${boss.hp} / ${boss.maxHp}`, canvas.width / 2, 70);
    }

    // 7. パーティクル & テキスト描画
    drawParticles();
    drawFloatTexts();

    // 8. HUD 画面表示
    // スコア & ハイスコア
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`SCORE: ${score}`, 20, 30);
    
    ctx.textAlign = 'right';
    ctx.fillText(`HIGH: ${highScore}`, canvas.width - 20, 30);

    // プレイヤーライフ
    ctx.textAlign = 'left';
    ctx.fillStyle = '#888';
    ctx.fillText('LIFE: ', 20, 55);
    ctx.fillStyle = '#00ff66';
    ctx.font = '16px sans-serif';
    let lifeStr = '';
    for (let i = 0; i < player.maxHp; i++) {
        lifeStr += i < player.hp ? '❤️' : '🖤';
    }
    ctx.fillText(lifeStr, 60, 56);

    // 武器タイマー表示
    if (player.weapon !== 'normal') {
        const barColor = player.weapon === 'double' ? '#ff007f' : '#fffb00';
        const label = player.weapon === 'double' ? 'DUAL LASER' : 'TRIPLE LASER';
        const duration = player.weapon === 'double' ? 480 : 360;
        const width = Math.max(0, 120 * (player.weaponTimer / duration));
        
        ctx.fillStyle = '#888';
        ctx.font = 'bold 11px monospace';
        ctx.fillText(label, 20, canvas.height - 20);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.fillRect(115, canvas.height - 29, 120, 8);
        ctx.fillStyle = barColor;
        ctx.fillRect(115, canvas.height - 29, width, 8);
    }

    ctx.restore(); // カメラ振れの復元
}

// --- メインループ ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// 初期起動
resetGame();
setupMobileControls();
gameLoop();
</script>
